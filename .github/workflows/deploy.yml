name: Deploy Flutter Web to Vercel

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Set up Flutter SDK environment
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 3. Retrieve pub dependencies
      - name: Install Dependencies
        run: flutter pub get

      # 4. Compile static web bundle
      - name: Build Flutter Web
        run: flutter build web --release

      # 5. Copy vercel.json explicitly to build output
      - name: Copy vercel.json
        run: cp web/vercel.json build/web/vercel.json

      # 6. Deploy build/web directory to Vercel Cloud
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./build/web
          vercel-args: '--prod'
